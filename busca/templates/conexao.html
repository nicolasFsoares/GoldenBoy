{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Golden Boy - Vaga</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'bootstrap.min.css' %}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <!-- Estilo customizado -->
    <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">

    <!-- JS customizado -->
    <script src="{% static 'javascript.js' %}"></script>
</head>
<body>

    <div class="container-fluid">
        <div class="row busca-top">
            <div class="col" style="margin-left: -10px !important;">
                <a href="/" class="bt-perfil"><img src="/static/media/casa.png" width="30" height="30"></a>
            </div>
            <div class="col-7 title-site text-center">
                <h5><b>Golden Boy</b></h5>
            </div>
            <div class="col text-right">
                <a href="/jogador/1/" class="bt-perfil"><img src="/static/media/jogador-2.png" width="30" height="30" alt="Perfil" ></a>
            </div>
        </div>
    </div>

    <div class="container mb-5 mt-5">
        <div class="row mt-3">
            <div class="col box-busca" style="background-color: {{dados.clube.cor}}">
                <div class="row m-3 box-line">
                    <div class="col-2 box-logo">
                        <img src="{{dados.clube.imagem.thumb.url}}" width="150" height="150">
                    </div>
                    <div class="col-10 box-dados-clube" >
                        <div class="row m-1 box-nome-clube">
                            {{dados.clube.nome}}
                        </div>
                        <div class="row m-1 box-desc-clube">
                            {{dados.clube.descricao}}
                        </div>
                    </div>
                </div>
                <div class="row m-3 box-line">
                     <div class="col box-dados-busca">
                        <div class="col-2 mr-3 box-posicao-categoria">
                            <div class="row box-posicao">
                                <div class="col-6">
                                    <img src="/static/media/jogador-2.png" width="50" height="50">
                                </div>
                                <div class="col-6 box-desc-posicao">
                                    {{dados.posicao.nome}}
                                </div>
                            </div>
                            <div class="row box-posicao-2">
                                <div class="col-6">
                                    <img src="/static/media/soccer-flag.png" width="50" height="50">
                                </div>
                                <div class="col-6">
                                    {{dados.categoria.nome}}
                                </div>
                            </div>
                        </div>
                        <div class="col-9 p-3 box-busca-desc" style="border-left: 3px {{dados.clube.cor}} dotted;">{{dados.descricao}}</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-2">
            <div class="col-12">
                <form name="form" id="form" action="/createConexao/" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <input type="hidden" name="clube" value="{{dados.clube.id}}">
                    <input type="hidden" name="jogador" value="1">
                    <input type="submit" class="col-12 m-auto bt-edit-jogador" id="bt-conecta" style="background-color: {{dados.clube.cor}}" value="Conectar-se!">
                </form>
            </div>
        </div>
    </div>

    {% load static %}
    <script src="{% static 'javasscript.js' %}"></script>
</body>
</html>
