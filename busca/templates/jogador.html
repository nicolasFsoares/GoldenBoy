{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Golden Boy - Jogador</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'bootstrap.min.css' %}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <!-- Estilo customizado -->
    <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">

    <!-- JS customizado -->
    <script src="{% static 'javascript.js' %}"></script>
</head>
<body>

    <div class="container-fluid">
        <div class="row busca-top">
            <div class="col" style="margin-left: -10px !important;">
                <a href="/" class="bt-perfil"><img src="/static/media/casa.png" width="30" height="30"></a>
            </div>
            <div class="col-7 title-site text-center">
                <h5><b>Golden Boy</b></h5>
            </div>
            <div class="col text-right">
                <a href="/jogador/{{db.id}}/" class="bt-perfil"><img src="/static/media/jogador-2.png" width="30" height="30" alt="Perfil" ></a>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <div class="row mt-3">
            <div class="col-2"></div>
            <div class="col-8 p-3 box-dados-jogador">
                <div class="row">
                    <div class="col-4"><img class="pic-jogador" src="{{db.imagem.thumb.url}}" width="230" height="230"></div>
                    <div class="col-7" id="dados-jogador">
                        <div class="row nome-jogador">{{db.nome}}</div>
                        <div class="row mt-2 text-left desc-jogador">{{db.descricao}}</div>
                    </div>
                </div>
            </div>
            <div class="col-2"></div>
        </div>
        <div class="row mt-3">
            <div class="col-2"></div>
            <div class="col-3 mr-1 p-1 label-contato-jogador" style="font-size: 15px !important;">
                <b>Telefone:</b>{{db.telefone}}
            </div>
            <div class="col-5 p-1 label-contato-jogador" style="font-size: 15px !important;">
                <b>Email:</b> {{db.email}}
            </div>
            <div class="col-2"></div>
        </div>
        <div class="row mt-3">
            <div class="col-2"></div>
            <div class="col-8 p-1 bt-edit-jogador">
                <a href="/conexoes/1/" style="text-decoration: none;">
                    Conexões
                </a>
            </div>
            <div class="col-2"></div>
        </div>
        <div class="row mt-3">
            <div class="col-2"></div>
            <div class="col-8 p-1 bt-edit-jogador">
                <a href="/jogadorEdit/{{db.id}}/" style="text-decoration: none;">
                    Editar
                </a>
            </div>
            <div class="col-2"></div>
        </div>
    </div>

    {% load static %}
    <script src="{% static 'javasscript.js' %}"></script>
</body>
</html>
