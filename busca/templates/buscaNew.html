{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Golden Boy</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'bootstrap.min.css' %}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <!-- Estilo customizado -->
    <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">

    <!-- JS customizado -->
    <script src="{% static 'javascript.js' %}"></script>
</head>
<body>

    <div class="container-fluid">
        <div class="row busca-top">
            <div class="col" style="margin-left: -10px !important;">
                <a href="/" class="bt-perfil"><img src="/static/media/casa.png" width="30" height="30"></a>
            </div>
            <div class="col-7 title-site text-center">
                <h5><b>Golden Boy</b></h5>
            </div>
            <div class="col text-right">
                <a href="/jogador/1/" class="bt-perfil"><img src="/static/media/jogador-2.png" width="30" height="30" alt="Perfil" ></a>
            </div>
        </div>
    </div>

    <div class="container m-auto">
        <div class="row mb-5">
            <div class="col"></div>
            <div class="col-12 mt-5 pb-2 text-center title-conexoes">
                <h2>PROPOSTAS</h2>
            </div>
            <div class="col"></div>
        </div>
    </div>


    <div class="container mb-5 mt-3">
        {% for d in dados %}
        <div class="row mt-3">
            <div class="col box-busca" style="background-color: {{d.clube.cor}}">
                <div class="row m-3 box-line">
                    <div class="col-2 box-logo">
                        <img src="{{d.clube.imagem.thumb.url}}" width="150" height="150">
                    </div>
                    <div class="col-4 box-dados-clube" >
                        <div class="row m-1 box-nome-clube">
                            {{d.clube.nome}}
                        </div>
                        <div class="row m-1 box-desc-clube">
                            {{d.clube.descricao | slice:"0:250"}}...
                        </div>
                    </div>
                    <div class="col box-dados-busca">
                        <div class="col-3 mr-3 box-posicao-categoria">
                            <div class="row box-posicao">
                                <div class="col-6">
                                    <img src="/static/media/jogador-2.png" width="50" height="50">
                                </div>
                                <div class="col-6 box-desc-posicao">
                                    {{d.posicao.nome}}
                                </div>
                            </div>
                            <div class="row box-posicao-2">
                                <div class="col-6">
                                    <img src="/static/media/soccer-flag.png" width="50" height="50">
                                </div>
                                <div class="col-6">
                                    {{d.categoria.nome}}
                                </div>
                            </div>
                        </div>
                        <div class="col-9 p-3 box-busca-desc" style="border-left: 3px {{d.clube.cor}} dotted;">{{d.descricao | slice:"0:200"}}...</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-1 bt-abre-busca" style="background-color: {{d.clube.cor}}">
            <div class="col-12">
                <a href="/conexao/{{d.id}}/" style="text-decoration: none;"><b>Saiba mais!</b></a>
            </div>
        </div>
        {% endfor %}
    </div>

    {% load static %}
    <script src="{% static 'javasscript.js' %}"></script>
</body>
</html>
